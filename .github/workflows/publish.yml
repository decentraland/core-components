name: Publish

on:
  push:
    branches:
      - main
jobs:
  publish:
    permissions:
      contents: write
      pull-requests: write
      # Required so the runner can mint an OIDC token; pnpm exchanges it
      # with the npm registry for a short-lived publish credential (Trusted
      # Publishing). Replaces the long-lived NPM_TOKEN secret that used to
      # be written into ~/.npmrc.
      id-token: write
    runs-on: ubuntu-latest
    # Prevents multiple jobs from running at the same time
    concurrency:
      group: publish-packages
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages [skip ci]'
          publish: pnpm ci:publish
          commitMode: 'github-api'
        env:
          GITHUB_TOKEN: ${{ github.token }}
