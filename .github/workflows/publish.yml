name: Publish

on:
  push:
    branches:
      - main
jobs:
  publish:
    permissions:
      contents: write
      pull-requests: write
      # Required so the runner can mint an OIDC token; pnpm exchanges it
      # with the npm registry for a short-lived publish credential (Trusted
      # Publishing). Replaces the long-lived NPM_TOKEN secret that used to
      # be written into ~/.npmrc.
      id-token: write
    runs-on: ubuntu-latest
    # Prevents multiple jobs from running at the same time
    concurrency:
      group: publish-packages
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        # Pinned by commit SHA (tags are mutable). Bump deliberately when reviewing a new release.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        # Pinned to v6.0.8 by commit SHA. Tags on third-party actions are
        # mutable; a SHA is not. Bump deliberately when reviewing a new
        # release rather than tracking a floating tag.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node.js
        # Pinned by commit SHA (tags are mutable). Bump deliberately when reviewing a new release.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      # Node 20 ships with npm 10.x; Trusted Publishing landed in npm 11.5.1.
      # pnpm publish shells through npm under the hood, so the npm CLI on the
      # runner is what needs to support the OIDC exchange. Pin to a known-good
      # version that has trusted publishing rather than tracking @latest, so a
      # future npm release can't break this workflow without us noticing.
      - name: Install npm with Trusted Publishing support
        run: npm install -g npm@^11.5.1

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        # Pinned to v1.9.0 by commit SHA. Tags on third-party actions are
        # mutable; a SHA is not. Bump deliberately when reviewing a new
        # release rather than tracking a floating tag.
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages [skip ci]'
          # `version-packages` runs `changeset version` AND refreshes the lockfile
          # (`pnpm install --lockfile-only`). Without the refresh the bumped package.json
          # files and pnpm-lock.yaml drift apart, and the next `pnpm install --frozen-lockfile`
          # (CI default) fails with ERR_PNPM_OUTDATED_LOCKFILE. The action commits the updated
          # lockfile alongside the version bumps into the "Version Packages" PR.
          version: pnpm version-packages
          publish: pnpm ci:publish
          createGithubReleases: true
          commitMode: 'github-api'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # changeset publish shells through `npm publish`; this env flips on
          # provenance the same way the previous `--provenance` flag did.
          NPM_CONFIG_PROVENANCE: 'true'
