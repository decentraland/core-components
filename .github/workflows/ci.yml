name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # Pinned to v6.0.8 by commit SHA. Tags on third-party actions are
        # mutable; a SHA is not. Bump deliberately when reviewing a new
        # release rather than tracking a floating tag.
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: pnpm changeset status --since=origin/main

      - name: Run linting
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      # Run tests only for packages that changed (and their dependents)
      - name: Run tests for changed packages
        run: pnpm --filter "...[origin/main]" run --if-present test
